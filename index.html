<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Phone Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

    <!-- Top Action Bar -->
    <header class="app-bar">
        <div class="top-row">
            <h1>Photos</h1>
            <div class="actions">
                <button id="theme-toggle" title="Toggle Theme">🌓</button>
                <button id="view-toggle" title="Switch Layout">🔲</button>
                <!-- Real Upload Button from Internal Storage -->
                <label for="image-upload" class="upload-btn">
                    <span>+ Add</span>
                    <input type="file" id="image-upload" accept="image/*" multiple style="display: none;">
                </label>
            </div>
        </div>
        
        <!-- Search & Filter Controls -->
        <div class="controls-row">
            <input type="text" id="search-bar" placeholder="Search photos by name...">
            <div class="filter-tabs">
                <button class="tab active" data-filter="all">All</button>
                <button class="tab" data-filter="favorites">❤️ Favorites</button>
            </div>
        </div>
    </header>

    <!-- Main Gallery Container -->
    <main class="gallery-container grid-view" id="gallery-container">
        <!-- Empty state message when no images are uploaded -->
        <div id="empty-state" class="empty-state">
            <p>No photos yet. Click '+ Add' to upload from your device.</p>
        </div>
    </main>

    <!-- Lightbox Preview Modal -->
    <div class="lightbox" id="lightbox">
        <span class="close-btn" id="close-lightbox">&times;</span>
        <button class="nav-btn prev-btn" id="prev-btn">&#10094;</button>
        
        <div class="lightbox-wrapper">
            <img id="lightbox-img" src="" alt="Preview">
            <div class="lightbox-footer">
                <span id="image-title">Image Name</span>
                <button id="fav-toggle-btn">❤️</button>
            </div>
        </div>
        
        <button class="nav-btn next-btn" id="next-btn">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
